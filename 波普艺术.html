<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>波普浪潮 · 波普艺术海报提示词古月AI智能体</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: "Microsoft YaHei", sans-serif; }
    body { background: linear-gradient(135deg, #ff5f6d, #ffc371); color: #222; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 2.2rem; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
    .poster-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; }
    .poster-card { background: linear-gradient(145deg, #ffeaa7, #fab1a0); border-radius: 12px; padding: 15px; width: 320px; box-shadow: 0 6px 20px rgba(0,0,0,0.2); position: relative; transition: transform 0.3s ease; }
    .poster-card:hover { transform: scale(1.05); }
    .main-title { font-size: 1.5rem; font-weight: bold; color: #d63031; text-align: center; margin-bottom: 8px; text-shadow: 1px 1px 2px #fff; }
    .subtitle { font-size: 1rem; color: #2d3436; text-align: center; margin-bottom: 8px; border: 1px dashed #636e72; border-radius: 6px; padding: 4px 6px; background: rgba(255,255,255,0.3); }
    .tags { font-size: 0.85rem; color: #0984e3; text-align: center; margin-bottom: 8px; }
    .copy-btn { position: absolute; bottom: 12px; right: 12px; padding: 6px 10px; background: #6c5ce7; color: #fff; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
    .copy-btn:hover { background: #341f97; }
</style>
</head>
<body>

<div class="header">
    <h1>波普浪潮 · 波普艺术海报提示词古月AI智能体</h1>
</div>

<div class="poster-container" id="posterContainer">
    <!-- 海报提示词卡片由JS生成 -->
</div>

<script>
const posterData = [];
const mainTitles = [
    "色彩爆炸", "街头狂欢", "流行冲击", "漫画狂潮", "视觉轰炸", "POP风暴", "青年力量", "限量联名", "夸张彩印", "广告狂想", "趣味涂鸦", "复古漫画", "网点狂热", "视觉弹跳", "色块碰撞", "消费狂欢", "明星头像", "汉堡狂想", "彩色网格", "动感拟声词"
];
const subtitles = [
    "限量发售", "全新上架", "热卖中", "街头限定", "青年文化", "音乐现场", "潮牌企划", "创意无限", "手绘彩印", "视觉震撼", "夸张风格", "信息轰炸", "复古怀旧", "广告风格", "爆炸效果", "色彩碰撞", "漫画分格", "点阵印刷", "拟声词放大", "重复复制"
];
const tags = ["POP!", "限量!", "全新!", "热卖中", "NEW", "HOT", "BANG!", "WOW!", "YOUTH", "潮流", "FUN", "ART", "视觉", "漫画", "广告", "colorful", "爆炸", "style", "graphic", "creative"];

// 生成20组随机提示词
for(let i=0;i<20;i++){
    const mainTitle = mainTitles[i];
    const subtitle = subtitles[i];
    // 随机选取2-3个标签
    const shuffledTags = tags.sort(()=>0.5-Math.random()).slice(0, Math.floor(Math.random()*2)+2);
    posterData.push({ mainTitle, subtitle, tags: shuffledTags.join(" | ") });
}

const container = document.getElementById('posterContainer');
posterData.forEach(item => {
    const card = document.createElement('div');
    card.className = 'poster-card';
    card.innerHTML = `
        <div class="main-title">${item.mainTitle}</div>
        <div class="subtitle">${item.subtitle}</div>
        <div class="tags">${item.tags}</div>
        <button class="copy-btn" onclick="copyText('${item.mainTitle} | ${item.subtitle} | ${item.tags}')">复制提示词</button>
    `;
    container.appendChild(card);
});

function copyText(text){
    navigator.clipboard.writeText(text).then(()=>{
        alert('已复制: ' + text);
    });
}
</script>

</body>
</html>
